<!DOCTYPE html>
<html>
<head>
	<title>Animation View</title>
	<style>
		body {
			background-color: black;
		}
		.container {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}
		.box {
			height: 100px;
			width: 100px;
			margin: 10px;
			background-color: white;
			animation: rotate 2s linear infinite;
		}
		@keyframes rotate {
			from {
				transform: rotate(0deg);
			}
			to {
				transform: rotate(360deg);
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
	</div>
</body>
</html>
